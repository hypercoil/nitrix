title: Federation
author: hypercoil
version: 0.1.0
quarto-required: ">=1.5.0"
contributes:
  shortcodes:
    - xref.lua
# The federation's distributable shared documentation surface: the xref shortcode
# (+ its pure resolver), the graphite/$accent theme, shared format metadata, the
# namespace registry, and the bibliography. THIS repo is the single source of
# truth; libraries install it pinned (quarto add hypercoil/quarto-federation@vX.Y.Z)
# and refresh with `quarto update`. Bump `version` + tag a release to ship a change.
