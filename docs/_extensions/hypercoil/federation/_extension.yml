title: Federation
author: hypercoil
version: 0.1.0
quarto-required: ">=1.5.0"
contributes:
  shortcodes:
    - xref.lua
# This extension is the federation's *distributable* shared surface: the xref
# shortcode (+ its resolver), the graphite/$accent theme, shared format metadata,
# the namespace registry, and the bibliography. The canonical sources live in
# the umbrella (doc/theme, doc/xref, doc/_bibliography); build/package-extension.sh
# syncs them here. Libraries pin and install this extension to build standalone.
