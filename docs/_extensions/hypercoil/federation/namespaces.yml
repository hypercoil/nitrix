# Federation cross-reference registry (SPEC §5.2). Single source of truth for
# which libraries are addressable and which anchors are *curated*, public,
# cross-library targets. Consumed as document metadata by xref.lua.
#
# `xref-mode` defaults to standalone (a lone library preview links out to the
# published hub). The composed umbrella build overrides it to `composed`
# (same-origin relative links) via `-M xref-mode:composed`.
#
# An anchor's value is "<relative-page>.qmd" or "<relative-page>.qmd#fragment".
# When the fragment is omitted it defaults to the anchor key. Only headings you
# deliberately expose belong here — not every heading is a public anchor.
#
# Mode is NOT set here: xref.lua defaults to standalone, and the composed
# umbrella build passes `-M xref-mode:composed` (no precedence fight).
xref-namespaces:
  nitrix:
    base_path: /nitrix/
    hub_url: https://hypercoil.github.io/nitrix/
    repo: https://github.com/hypercoil/nitrix
    anchors:
      fellner-schall: explanation/statistics/fellner-schall.qmd#fellner-schall
  tensorbids:
    base_path: /tensorbids/
    hub_url: https://hypercoil.github.io/tensorbids/
