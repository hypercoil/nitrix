project:
  type: website
  output-dir: _site
  # Render only the new federation docs. The legacy design/ and
  # feature-requests/ markdown stay in the repo as source material but are not
  # part of the rendered site (RECON: treat as signal, verify before lifting).
  render:
    - index.qmd
    - explanation/primer/*.qmd
    - explanation/statistics/*.qmd
    - explanation/geometry/*.qmd
    - explanation/registration/*.qmd
    - reference/*.qmd
    - reference/*/*.qmd

website:
  title: "nitrix"
  description: "GPU-accelerated pure numerics for neuroimaging in JAX/XLA."
  search: false                 # unified search is Pagefind over the merged hub
  navbar:
    background: "#060607"
    left:
      - href: index.qmd
        text: Home
      - text: Primer
        menu:
          - explanation/primer/index.qmd
          - text: "---"
          - explanation/primer/hardware.qmd
          - explanation/primer/xla-jax.qmd
          - explanation/primer/differentiation.qmd
          - explanation/primer/three-kernels.qmd
          - explanation/primer/differentiable-programming.qmd
          - explanation/primer/implicit-differentiation.qmd
          - explanation/primer/inductive-bias.qmd
      - text: Statistics
        menu:
          - explanation/statistics/index.qmd
          - explanation/statistics/foundations.qmd
          - text: "---"
          - explanation/statistics/glm.qmd
          - explanation/statistics/lme.qmd
          - explanation/statistics/gam.qmd
          - explanation/statistics/glmm.qmd
          - explanation/statistics/gamm.qmd
          - explanation/statistics/hsgp.qmd
          - text: "---"
          - explanation/statistics/solvers.qmd
          - explanation/statistics/fellner-schall.qmd
      - text: Geometry
        menu:
          - explanation/geometry/index.qmd
          - explanation/geometry/foundations.qmd
          - text: "---"
          - explanation/geometry/operators.qmd
          - explanation/geometry/laplace-beltrami.qmd
          - explanation/geometry/spectral.qmd
          - explanation/geometry/curvature.qmd
          - explanation/geometry/volumes.qmd
          - explanation/geometry/volume-surface.qmd
          - text: "---"
          - explanation/geometry/solvers.qmd
          - explanation/geometry/performance.qmd
          - explanation/geometry/graph-geometry.qmd
      - text: Registration
        menu:
          - explanation/registration/index.qmd
          - explanation/registration/foundations.qmd
          - text: "---"
          - explanation/registration/transforms.qmd
          - explanation/registration/resampling.qmd
          - explanation/registration/similarity.qmd
          - explanation/registration/optimization.qmd
          - explanation/registration/diffeomorphic.qmd
          - explanation/registration/surface-registration.qmd
          - text: "---"
          - explanation/registration/recipes.qmd
          - explanation/registration/performance.qmd
      - text: Reference
        href: reference/index.qmd
      - href: ../
        text: Federation

# Shared format defaults + xref registry come from the pinned federation
# extension, so a standalone `quarto preview docs/` is fully themed. (SPEC §4.3)
metadata-files:
  - _extensions/hypercoil/federation/_metadata.yml
  - _extensions/hypercoil/federation/namespaces.yml

bibliography: _extensions/hypercoil/federation/federation.bib

format:
  html:
    theme:
      - brand.scss
      - _extensions/hypercoil/federation/federation.scss
