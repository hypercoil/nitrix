project:
  type: website
  output-dir: _site
  # Render only the new federation docs. The legacy design/ and
  # feature-requests/ markdown stay in the repo as source material but are not
  # part of the rendered site (RECON: treat as signal, verify before lifting).
  render:
    - index.qmd
    - explanation/*.qmd

website:
  title: "nitrix"
  description: "GPU-accelerated pure numerics for neuroimaging in JAX/XLA."
  search: false                 # unified search is Pagefind over the merged hub
  navbar:
    background: "#060607"
    left:
      - href: index.qmd
        text: Home
      - text: Explanation
        menu:
          - explanation/index.qmd
          - explanation/foundations.qmd
          - text: "---"
          - explanation/glm.qmd
          - explanation/lme.qmd
          - explanation/gam.qmd
          - explanation/glmm.qmd
          - explanation/gamm.qmd
          - explanation/hsgp.qmd
          - text: "---"
          - explanation/solvers.qmd
          - explanation/fellner-schall.qmd
      - href: ../
        text: Federation

# Shared format defaults + xref registry come from the pinned federation
# extension, so a standalone `quarto preview docs/` is fully themed. (SPEC §4.3)
metadata-files:
  - _extensions/hypercoil/federation/_metadata.yml
  - _extensions/hypercoil/federation/namespaces.yml

bibliography: _extensions/hypercoil/federation/federation.bib

format:
  html:
    theme:
      - brand.scss
      - _extensions/hypercoil/federation/federation.scss
