# Pinned (op, dtype[, backend]) numerical tolerances for the kernel suite.
#
# The bare [op.dtype] row is the reference-equality / reference-vs-golden
# budget (tight; the golden is generated from the reference path).  An
# optional [op.dtype.backend] sub-table loosens the budget for a fused
# backend whose output is mathematically -- not bit -- equal to the
# reference (online-softmax reassociation, fp32 accumulation).
#
# Changing a tolerance is a CHANGELOG entry (SPEC §2.6).

[attention.float32]
atol = 1e-6
rtol = 1e-5

[attention.float64]
atol = 1e-12
rtol = 1e-12

# Fused flash path (suite Phase 2).
[attention.float32.pallas-cuda]
atol = 2e-3
rtol = 2e-3
